services:
  codexbar-api:
    build:
      context: .
      args:
        CODEXBAR_VERSION: v0.32.4
    image: codexbar-api:dev
    env_file: .env
    ports:
      - "3033:3000"
    volumes:
      - codexbar-cache:/home/node/.codexbar
      - ${HOME}/.claude:/home/node/.claude
      - ${HOME}/.codex:/home/node/.codex
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  codexbar-cache:
